name: CI

on:
  push:
    branches:
      - main
      - release
  pull_request:

jobs:
  formatting:
    name: Formatting and static analysis
    runs-on: 'ubuntu-24.04'
    outputs:
      min_python: ${{ steps.vars.outputs.min_python }}
      min_tox_env: ${{ steps.vars.outputs.min_tox_env }}
    steps:
      - uses: actions/checkout@v4
      - name: Get Python version for other CI jobs
        id: vars
        run: |
          echo "min_python=$(< .github/workflows/python-version-ci)" >> "$GITHUB_OUTPUT"
          echo "min_tox_env=py$(sed 's/\.//g' < .github/workflows/python-version-ci)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@v5
        with:
          python-version-file: '.github/workflows/python-version-ci'
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files
      - uses: pre-commit-ci/lite-action@v1.1.0
        if: always()
        with:
          msg: Apply automatic formatting

  tests:
    name: Tests
    needs: formatting
    strategy:
      matrix:
        os: ['ubuntu-24.04']
        python:
          - version: '${{needs.formatting.outputs.min_python}}'
            tox-env: '${{needs.formatting.outputs.min_tox_env}}'
    uses: ./.github/workflows/test.yml
    with:
      os-variant: ${{ matrix.os }}
      python-version: ${{ matrix.python.version }}
      tox-env: ${{ matrix.python.tox-env }}
    secrets: inherit

  integration:
    # Real-Kafka integration tests: fake data sources feeding the real
    # service stack (monitor_data/detector_data/data_reduction) plus the
    # dashboard backend, against a single-node KRaft broker. Runs in
    # parallel with the unit-test job.
    name: Integration tests (Kafka)
    needs: formatting
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      kafka:
        image: apache/kafka:3.9.1
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
          KAFKA_MESSAGE_MAX_BYTES: 104857600
          KAFKA_REPLICA_FETCH_MAX_BYTES: 104857600
        options: >-
          --health-cmd "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '${{ needs.formatting.outputs.min_python }}'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements/ci.txt
      - name: Run integration tests
        shell: bash
        run: |
          tox -e integration 2>&1 | tee integration-output.txt
          exit "${PIPESTATUS[0]}"
      - name: Surface failure output as annotations
        # Log download can be firewalled; annotations are readable via the
        # checks API. Emit the pytest failure summary in newline-escaped
        # chunks (annotation count and size are limited).
        if: failure()
        shell: bash
        run: |
          set +e
          sed -e 's/\x1b\[[0-9;]*m//g' integration-output.txt \
            | grep -v 'Consumed 0 messages' > clean.txt
          awk '/=== (FAILURES|ERRORS) ===/{found=1} found && n<150 {print; n++}' clean.txt > summary.txt
          grep 'DIAG' clean.txt >> summary.txt
          sed -n '/short test summary info/,$p' clean.txt >> summary.txt
          if [ ! -s summary.txt ]; then
            tail -n 100 clean.txt > summary.txt
          fi
          split -l 20 summary.txt chunk_
          n=0
          for f in chunk_*; do
            [ -e "$f" ] || continue
            n=$((n + 1))
            if [ "$n" -gt 8 ]; then break; fi
            msg=$(sed -e 's/%/%25/g' "$f" | awk '{printf "%s%%0A", $0}')
            echo "::error title=integration-tests part ${n}::${msg}"
          done
          true

  browser:
    # Playwright UI tests: a real chromium driving the dashboard served by the
    # in-process fake backend (no Kafka), covering multi-session sync and grid
    # management flows. Runs in parallel with the unit-test job.
    name: Browser UI tests (Playwright)
    needs: formatting
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '${{ needs.formatting.outputs.min_python }}'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements/ci.txt
      - name: Install chromium system libraries
        # The chromium binary itself is installed by the tox env (matching its
        # playwright version); only the apt-level libraries need sudo here.
        run: |
          python -m pip install playwright
          playwright install-deps chromium
      - name: Run browser tests
        shell: bash
        run: |
          tox -e browser 2>&1 | tee browser-output.txt
          exit "${PIPESTATUS[0]}"
      - name: Surface failure output as annotations
        # Log download can be firewalled; annotations are readable via the
        # checks API. Emit the pytest failure summary in newline-escaped
        # chunks (annotation count and size are limited).
        if: failure()
        shell: bash
        run: |
          set +e
          sed -e 's/\x1b\[[0-9;]*m//g' browser-output.txt > clean.txt
          awk '/=== (FAILURES|ERRORS) ===/{found=1} found && n<150 {print; n++}' clean.txt > summary.txt
          sed -n '/short test summary info/,$p' clean.txt >> summary.txt
          if [ ! -s summary.txt ]; then
            tail -n 100 clean.txt > summary.txt
          fi
          split -l 20 summary.txt chunk_
          n=0
          for f in chunk_*; do
            [ -e "$f" ] || continue
            n=$((n + 1))
            if [ "$n" -gt 8 ]; then break; fi
            msg=$(sed -e 's/%/%25/g' "$f" | awk '{printf "%s%%0A", $0}')
            echo "::error title=browser-tests part ${n}::${msg}"
          done
          true

  instrument-check:
    # Verify that an instrument deployment can construct its backend services
    # using only the dependencies declared in its extras. Catches imports that
    # accidentally depend on packages installed only via ``[test]`` or another
    # instrument's extras, which would break in production.
    name: Backend deps (${{ matrix.instrument }})
    needs: tests
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        instrument: [bifrost, dream, dummy, estia, loki, nmx, odin, tbl]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: '.github/workflows/python-version-ci'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install ".[${{ matrix.instrument }}]"
      - name: Smoke-check backend services
        run: |
          for svc in monitor_data detector_data data_reduction timeseries; do
            echo "::group::$svc"
            python -m ess.livedata.services.$svc \
              --instrument ${{ matrix.instrument }} --check
            echo "::endgroup::"
          done

  dashboard-check:
    # Verify the dashboard can be constructed for every instrument using only
    # the [dashboard] extra (which has no instrument-specific dependencies).
    # If this fails for some instrument, either the dashboard has acquired a
    # hidden instrument dependency or [dashboard] is missing something.
    name: Dashboard deps
    needs: tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: '.github/workflows/python-version-ci'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install ".[dashboard]"
      - name: Smoke-check dashboard for each instrument
        run: |
          for inst in dummy tbl bifrost dream loki odin estia nmx; do
            echo "::group::$inst"
            python -m ess.livedata.dashboard.reduction \
              --instrument $inst --transport none \
              --no-fetch-announcements --check
            echo "::endgroup::"
          done

  docs:
    needs: tests
    uses: ./.github/workflows/docs.yml
    with:
      publish: false
      linkcheck: ${{ github.ref == 'refs/heads/main' }}
      branch: ${{ github.head_ref == '' && github.ref_name || github.head_ref }}
    secrets: inherit
