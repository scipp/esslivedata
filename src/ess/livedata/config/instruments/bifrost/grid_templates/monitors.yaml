# Beam monitors overview
title: Monitors
description: Beam monitors with latest, rolling window, and since-start views
nrows: 3
ncols: 2
cells:
- geometry:
    row: 0
    col: 0
    row_span: 1
    col_span: 2
  layers:
  - data_sources:
      primary:
        workflow_id: bifrost/monitor_histogram/1
        view_name: histogram
        source_names:
        - psc_monitor
        - overlap_monitor
        - bandwidth_monitor
        - normalization_monitor
        - elastic_monitor
    plot_name: lines
    params:
      plot_aspect:
        aspect_type: Free
      window:
        mode: window
- geometry:
    row: 1
    col: 0
    row_span: 1
    col_span: 2
  layers:
  - data_sources:
      primary:
        workflow_id: bifrost/monitor_histogram/1
        view_name: histogram
        source_names:
        - psc_monitor
        - overlap_monitor
        - bandwidth_monitor
        - normalization_monitor
        - elastic_monitor
    plot_name: lines
    params:
      plot_aspect:
        aspect_type: Free
      window:
        mode: window
        window_duration_seconds: 30.0
- geometry:
    row: 2
    col: 0
    row_span: 1
    col_span: 2
  layers:
  - data_sources:
      primary:
        workflow_id: bifrost/monitor_histogram/1
        view_name: histogram
        source_names:
        - psc_monitor
        - overlap_monitor
        - bandwidth_monitor
        - normalization_monitor
        - elastic_monitor
    plot_name: lines
    params:
      plot_aspect:
        aspect_type: Free
      window:
        mode: since_start
