# Bragg peak monitor histograms and time series
title: Bragg Peak Monitor
description: Bragg peak monitor counts, histograms, and time series
nrows: 4
ncols: 4
cells:
- geometry:
    row: 0
    col: 0
    row_span: 2
    col_span: 2
  layers:
  - data_sources:
      primary:
        workflow_id: bifrost/monitor_data/monitor_histogram/1
        view_name: total_in_range
        source_names:
        - bragg_peak_monitor
    plot_name: timeseries
    params:
      plot_aspect:
        aspect_type: Free
- geometry:
    row: 0
    col: 2
    row_span: 2
    col_span: 2
  layers:
  - data_sources:
      primary:
        workflow_id: bifrost/monitor_data/monitor_histogram/1
        view_name: histogram
        source_names:
        - bragg_peak_monitor
    plot_name: lines
    params:
      plot_aspect:
        aspect_type: Free
      window:
        mode: latest
- geometry:
    row: 2
    col: 0
    row_span: 2
    col_span: 2
  layers:
  - data_sources:
      primary:
        workflow_id: bifrost/monitor_data/monitor_histogram/1
        view_name: total_counts
        source_names:
        - bragg_peak_monitor
    plot_name: timeseries
    params:
      plot_aspect:
        aspect_type: Free
- geometry:
    row: 2
    col: 2
    row_span: 2
    col_span: 2
  layers:
  - data_sources:
      primary:
        workflow_id: bifrost/monitor_data/monitor_histogram/1
        view_name: histogram
        source_names:
        - bragg_peak_monitor
    plot_name: lines
    params:
      plot_aspect:
        aspect_type: Free
      window:
        mode: since_start
