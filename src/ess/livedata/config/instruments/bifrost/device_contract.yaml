#
# NICOS derived-device contract for the bifrost instrument.
#
# Exposes each monitor's cumulative total counts as a NICOS device. Validated
# against the live workflow registry at load time.
entries:
  - workflow_id: bifrost/monitor_histogram/1
    output_name: counts_total_cumulative
    device_name: "{source_name}_counts_total"
    source_names:
      - psc_monitor
      - overlap_monitor
      - bandwidth_monitor
      - normalization_monitor
      - elastic_monitor
