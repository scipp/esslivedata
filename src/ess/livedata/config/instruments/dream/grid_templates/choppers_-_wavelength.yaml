title: Choppers -> Wavelength
nrows: 2
ncols: 3
cells:
- geometry:
    row: 0
    col: 0
    row_span: 2
    col_span: 2
  layers:
  - data_sources:
      primary:
        workflow_id: dream/wavelength_lut/1
        source_names:
        - chopper_cascade
        view_name: chopper_cascade_bands
    plot_name: overlay_1d
    params:
      layout:
        combine_mode: overlay
        layout_columns: 2
      plot_aspect:
        aspect_type: Free
        ratio: 1.0
        stretch_mode: Fill width
      plot_scale:
        x_scale: linear
        y_scale: linear
      ticks:
        custom_xticks: false
        xticks: 5
        custom_yticks: false
        yticks: 5
      line:
        mode: points
        errors: band
      window:
        mode: window
        window_duration_seconds: 0.0
        aggregation: auto
      rate:
        normalize_to_rate: false
- geometry:
    row: 0
    col: 2
    row_span: 2
    col_span: 1
  layers:
  - data_sources:
      primary:
        workflow_id: dream/wavelength_lut/1
        source_names:
        - chopper_cascade
        view_name: wavelength_lut
    plot_name: image
    params:
      layout:
        combine_mode: overlay
        layout_columns: 2
      plot_aspect:
        aspect_type: Free
        ratio: 1.0
        stretch_mode: Fill width
      plot_scale:
        x_scale: linear
        y_scale: linear
        color_scale: log
      ticks:
        custom_xticks: false
        xticks: 5
        custom_yticks: false
        yticks: 5
      window:
        mode: window
        window_duration_seconds: 0.0
        aggregation: auto
      rate:
        normalize_to_rate: false
  - data_sources:
      primary:
        workflow_id: static/geometric/1
        source_names: []
        view_name: Choppers
    plot_name: hlines
    params:
      geometry:
        positions: 6.145,6.155,6.174,9.780,13.050
      style:
        color: '#ff0000'
        line_width: 1.0
        line_dash: solid
        alpha: 0.7